    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="2600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0F1A"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
