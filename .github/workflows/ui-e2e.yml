name: UI E2E

on:
  workflow_dispatch:

jobs:
  ui-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: python -m pip install -r requirements.txt

      - name: Run UI preflight (build + Playwright smoke)
        run: bash ./scripts/preflight_ui.sh
