  <rect x="230" y="1720" width="130" height="24" rx="12" fill="#111827" stroke="#1F2937"/>
  <text x="242" y="1736" fill="#A5B4FC" font-size="10" font-family="IBM Plex Mono, monospace">TIMESTAMPS</text>
  <rect x="368" y="1720" width="140" height="24" rx="12" fill="#111827" stroke="#1F2937"/>
  <text x="380" y="1736" fill="#A5B4FC" font-size="10" font-family="IBM Plex Mono, monospace">REASON CODES</text>
