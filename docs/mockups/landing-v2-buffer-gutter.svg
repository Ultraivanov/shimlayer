  <!-- Split layout -->
  <rect x="496" y="110" width="1" height="2050" fill="#1F2937"/>

  <!-- Left: fixed hero -->
  <text x="90" y="150" fill="#A5B4FC" font-size="10" font-family="IBM Plex Mono, monospace">ALPHA · API‑FIRST · TRACEABLE</text>
  <text x="90" y="210" fill="#E2E8F0" font-size="40" font-family="IBM Plex Mono, monospace">Human recovery layer</text>
  <text x="90" y="254" fill="#E2E8F0" font-size="40" font-family="IBM Plex Mono, monospace">for AI agents</text>
  <text x="90" y="300" fill="#CBD5F5" font-size="16" font-family="Inter, sans-serif">When an agent gets stuck, uncertain, or reaches a risky action,</text>
  <text x="90" y="326" fill="#CBD5F5" font-size="16" font-family="Inter, sans-serif">ShimLayer routes the step to a human and returns a bounded intervention.</text>
  <text x="90" y="356" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">API‑first · 1–3 min interventions · full trace</text>

  <rect x="90" y="382" width="220" height="46" rx="12" fill="#7C3AED"/>
  <text x="120" y="410" fill="#F8FAFC" font-size="12" font-family="IBM Plex Mono, monospace">Request Alpha Access</text>
  <rect x="90" y="440" width="220" height="40" rx="10" fill="none" stroke="#1F2937"/>
  <text x="122" y="466" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">See how it works</text>

  <rect x="90" y="520" width="360" height="1" fill="#1F2937"/>
  <text x="90" y="548" fill="#94A3B8" font-size="11" font-family="IBM Plex Mono, monospace">TRUSTED BY PRODUCT TEAMS</text>
  <text x="90" y="576" fill="#CBD5F5" font-size="12" font-family="Inter, sans-serif">Parable · Reveri Health · Listener · NewsChat</text>

  <!-- Right: scroll content -->
  <text x="512" y="150" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">00</text>
  <text x="542" y="150" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">RUNTIME BOUNDARY</text>
  <rect x="512" y="170" width="760" height="210" rx="14" fill="#0D1625" stroke="#1F2937"/>
  <text x="542" y="210" fill="#E2E8F0" font-size="12" font-family="IBM Plex Mono, monospace">agent.run()</text>
  <text x="542" y="236" fill="#E2E8F0" font-size="12" font-family="IBM Plex Mono, monospace">if stuck or low_confidence or risky_action:</text>
  <text x="542" y="262" fill="#E2E8F0" font-size="12" font-family="IBM Plex Mono, monospace">    result = shimlayer.resolve(context)</text>
  <text x="542" y="288" fill="#E2E8F0" font-size="12" font-family="IBM Plex Mono, monospace">    agent.apply(result)</text>
  <text x="542" y="320" fill="#94A3B8" font-size="10" font-family="IBM Plex Mono, monospace">input: logs, state, screenshot · output: decision + trace · delivery: push + pull</text>

  <rect x="512" y="420" width="760" height="1" fill="#1F2937"/>

  <text x="512" y="456" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">01</text>
  <text x="542" y="456" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">THIS IS FOR / NOT FOR</text>
  <text x="542" y="486" fill="#CBD5F5" font-size="12" font-family="Inter, sans-serif">Teams running agents in production · Not for prompt playgrounds</text>

  <rect x="512" y="520" width="760" height="1" fill="#1F2937"/>

  <text x="512" y="556" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">02</text>
  <text x="542" y="556" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">FAILURE MODES / SOLUTION</text>
  <text x="542" y="586" fill="#CBD5F5" font-size="12" font-family="Inter, sans-serif">Stuck loops · UI drift · Low confidence · Risky actions</text>

  <rect x="512" y="620" width="760" height="1" fill="#1F2937"/>

  <text x="512" y="656" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">03</text>
  <text x="542" y="656" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">HOW IT WORKS</text>
  <text x="542" y="686" fill="#CBD5F5" font-size="12" font-family="Inter, sans-serif">Input context → Human decision → Agent continues (traceable)</text>

  <rect x="512" y="720" width="760" height="1" fill="#1F2937"/>

  <text x="512" y="756" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">04</text>
  <text x="542" y="756" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">ALPHA SCOPE</text>
  <text x="542" y="786" fill="#CBD5F5" font-size="12" font-family="Inter, sans-serif">Stuck states · Broken UI · Binary approvals</text>

  <rect x="512" y="820" width="760" height="1" fill="#1F2937"/>

  <text x="512" y="856" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">05</text>
  <text x="542" y="856" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">PROOF LAYER</text>
  <text x="542" y="886" fill="#CBD5F5" font-size="12" font-family="Inter, sans-serif">Execution log · timestamps · reason codes · replayable trace</text>

  <rect x="512" y="920" width="760" height="1" fill="#1F2937"/>

  <text x="512" y="956" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">06</text>
  <text x="542" y="956" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">PRICING</text>
  <text x="542" y="986" fill="#CBD5F5" font-size="12" font-family="Inter, sans-serif">$1.80 per recovery · Free tier 50/mo · $49/25 · $199/120 · $999/600</text>

  <rect x="512" y="1020" width="760" height="1" fill="#1F2937"/>

  <text x="512" y="1056" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">07</text>
  <text x="542" y="1056" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">ALPHA PROGRAM</text>
  <text x="542" y="1086" fill="#CBD5F5" font-size="12" font-family="Inter, sans-serif">Early alpha · limited capacity · manual onboarding · feedback loop</text>

  <rect x="512" y="1120" width="760" height="1" fill="#1F2937"/>

  <text x="512" y="1156" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">08</text>
  <text x="542" y="1156" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">REQUEST ACCESS</text>
