  <!-- Nav -->
  <text x="80" y="56" fill="#E2E8F0" font-size="14" font-family="IBM Plex Mono, monospace">ShimLayer</text>
  <text x="520" y="56" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">How it works</text>
  <text x="640" y="56" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">Scope</text>
  <text x="720" y="56" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">Pricing</text>
  <text x="820" y="56" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">Alpha</text>
