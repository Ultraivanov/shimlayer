  <rect width="1440" height="2600" fill="url(#bg)"/>

  <!-- Nav -->
  <rect x="80" y="24" width="1280" height="68" rx="16" fill="#0B1220" stroke="#1F2937"/>
  <circle cx="116" cy="58" r="10" fill="#22D3EE"/>
  <text x="136" y="64" fill="#E2E8F0" font-size="14" font-family="IBM Plex Mono, monospace">ShimLayer</text>
  <text x="520" y="64" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">How it works</text>
  <text x="640" y="64" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">Scope</text>
  <text x="720" y="64" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">Pricing</text>
  <text x="820" y="64" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">Alpha</text>
  <rect x="1130" y="40" width="210" height="36" rx="10" fill="#22D3EE"/>
  <text x="1165" y="63" fill="#0B0F1A" font-size="12" font-family="IBM Plex Mono, monospace">Request Alpha Access</text>

  <!-- Hero -->
  <rect x="80" y="120" width="1280" height="360" rx="24" fill="#0B1220" stroke="#1F2937"/>
  <rect x="120" y="152" width="72" height="24" rx="12" fill="#111827" stroke="#1F2937"/>
  <text x="132" y="168" fill="#A5B4FC" font-size="10" font-family="IBM Plex Mono, monospace">ALPHA</text>
  <rect x="204" y="152" width="92" height="24" rx="12" fill="#111827" stroke="#1F2937"/>
  <text x="214" y="168" fill="#A5B4FC" font-size="10" font-family="IBM Plex Mono, monospace">API‑FIRST</text>
  <rect x="304" y="152" width="104" height="24" rx="12" fill="#111827" stroke="#1F2937"/>
  <text x="316" y="168" fill="#A5B4FC" font-size="10" font-family="IBM Plex Mono, monospace">TRACEABLE</text>

  <text x="120" y="226" fill="#E2E8F0" font-size="36" font-family="IBM Plex Mono, monospace">Human recovery layer</text>
  <text x="120" y="262" fill="#E2E8F0" font-size="36" font-family="IBM Plex Mono, monospace">for AI agents</text>
  <text x="120" y="304" fill="#CBD5F5" font-size="15" font-family="Inter, sans-serif">When an agent gets stuck, uncertain, or reaches a risky action,</text>
  <text x="120" y="328" fill="#CBD5F5" font-size="15" font-family="Inter, sans-serif">ShimLayer routes the step to a human and returns a bounded intervention.</text>
  <text x="120" y="356" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">API‑first · 1–3 min interventions · full trace</text>
  <rect x="120" y="380" width="220" height="46" rx="12" fill="#7C3AED"/>
  <text x="150" y="408" fill="#F8FAFC" font-size="12" font-family="IBM Plex Mono, monospace">Request Alpha Access</text>
  <rect x="352" y="380" width="210" height="46" rx="12" fill="#111827" stroke="#1F2937"/>
  <text x="392" y="408" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">See how it works</text>

  <rect x="820" y="160" width="500" height="280" rx="18" fill="#0F172A" stroke="#1F2937"/>
  <text x="852" y="192" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">Runtime boundary</text>
  <rect x="852" y="210" width="436" height="1" fill="#1F2937"/>
  <text x="852" y="236" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Escalate only on stuck / low‑confidence / risky</text>
  <text x="852" y="262" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Human returns minimal decision + trace</text>
  <text x="852" y="288" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Structured output + replayable logs</text>
  <text x="852" y="314" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Push + pull delivery for convergence</text>

  <!-- Audience -->
  <text x="80" y="560" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">01</text>
  <rect x="80" y="580" width="620" height="180" rx="18" fill="#0B1220" stroke="#1F2937"/>
  <text x="110" y="610" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">THIS IS FOR</text>
  <text x="110" y="642" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Teams running agents in production</text>
  <text x="110" y="666" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Infra‑minded founders shipping workflows</text>
  <text x="110" y="690" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Devs who need recovery without babysitting</text>

  <rect x="740" y="580" width="620" height="180" rx="18" fill="#0B1220" stroke="#1F2937"/>
  <text x="770" y="610" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">THIS IS NOT FOR</text>
  <text x="770" y="642" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Prompt playgrounds / demos only</text>
  <text x="770" y="666" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• General consumer AI curiosity</text>
  <text x="770" y="690" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• Teams without production pain</text>

  <!-- Problem/Solution -->
  <text x="80" y="810" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">02</text>
  <rect x="80" y="830" width="620" height="200" rx="18" fill="#0B1220" stroke="#1F2937"/>
  <text x="110" y="860" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">FAILURE MODES</text>
  <text x="110" y="892" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• stuck loops and retries</text>
  <text x="110" y="916" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• UI / flow drift</text>
  <text x="110" y="940" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• low‑confidence decisions</text>
  <text x="110" y="964" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• risky actions</text>

  <rect x="740" y="830" width="620" height="200" rx="18" fill="#0B1220" stroke="#1F2937"/>
  <text x="770" y="860" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">SOLUTION BOUNDARY</text>
  <text x="770" y="892" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">1. detect stuck / unsafe</text>
  <text x="770" y="916" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">2. package context</text>
  <text x="770" y="940" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">3. human resolves</text>
  <text x="770" y="964" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">4. agent continues</text>

  <!-- How -->
  <text x="80" y="1080" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">03</text>
  <rect x="80" y="1100" width="1280" height="240" rx="18" fill="#0B1220" stroke="#1F2937"/>
  <text x="110" y="1130" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">HOW IT WORKS</text>
  <rect x="110" y="1150" width="560" height="150" rx="12" fill="#0F172A" stroke="#1F2937"/>
  <text x="130" y="1180" fill="#E2E8F0" font-size="12" font-family="IBM Plex Mono, monospace">agent.run()</text>
  <text x="130" y="1206" fill="#E2E8F0" font-size="12" font-family="IBM Plex Mono, monospace">if stuck or low_confidence:</text>
  <text x="130" y="1232" fill="#E2E8F0" font-size="12" font-family="IBM Plex Mono, monospace">    result = shimlayer.resolve(context)</text>
  <text x="130" y="1258" fill="#E2E8F0" font-size="12" font-family="IBM Plex Mono, monospace">    agent.apply(result)</text>

  <rect x="720" y="1150" width="600" height="150" rx="12" fill="#0F172A" stroke="#1F2937"/>
  <text x="740" y="1180" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">input</text>
  <text x="800" y="1180" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">logs, state, screenshot / DOM</text>
  <text x="740" y="1212" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">output</text>
  <text x="810" y="1212" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">next action, structured result, trace</text>
  <text x="740" y="1244" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">delivery</text>
  <text x="820" y="1244" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">push + pull (convergent)</text>

  <!-- Scope -->
  <text x="80" y="1390" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">04</text>
  <rect x="80" y="1410" width="1280" height="160" rx="18" fill="#0B1220" stroke="#1F2937"/>
  <text x="110" y="1440" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">ALPHA SCOPE</text>
  <text x="110" y="1472" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• stuck states and loops</text>
  <text x="110" y="1496" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• broken or changed UI</text>
  <text x="110" y="1520" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• binary decisions</text>
  <text x="110" y="1544" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">• explicit human approval for risky actions</text>

  <!-- Proof -->
  <text x="80" y="1620" fill="#94A3B8" font-size="12" font-family="IBM Plex Mono, monospace">05</text>
  <rect x="80" y="1640" width="1280" height="160" rx="18" fill="#0B1220" stroke="#1F2937"/>
  <text x="110" y="1670" fill="#A5B4FC" font-size="11" font-family="IBM Plex Mono, monospace">PROOF LAYER</text>
  <text x="110" y="1700" fill="#CBD5F5" font-size="12" font-family="IBM Plex Mono, monospace">Execution log · timestamps · reason codes · replayable trace</text>
  <rect x="110" y="1720" width="110" height="24" rx="12" fill="#111827" stroke="#1F2937"/>
